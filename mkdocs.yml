# Canonical project metadata used by the generated site.
site_name: Grokking LLM System Design
site_description: Reader-first technical book on RAG, agents, evaluation, LLMOps, and governance.
site_url: https://zheng-lu.github.io/grokking-llm-system-design-in-enterprise/
repo_url: https://github.com/Zheng-Lu/grokking-llm-system-design-in-enterprise
repo_name: GitHub
edit_uri: edit/main/docs/

# Keep the build strict so broken internal links and malformed pages fail fast in CI.
docs_dir: docs
site_dir: site
strict: true

# The sidebar catalogue follows the book's major sections so the structure stays readable and easy to extend.
nav:
  - Home: index.md
  - Introduction:
      - introduction/index.md
      - introduction/about.md
      - introduction/roadmap.md
  - RAG Systems:
      - rag-systems/index.md
      - rag-systems/foundations.md
      - rag-systems/permission-aware-rag.md
      - rag-systems/hybrid-retrieval.md
      - rag-systems/design-prompt.md
  - Agent Systems:
      - agent-systems/index.md
      - agent-systems/foundations.md
      - agent-systems/multi-agent-orchestration.md
  - Evaluation:
      - evaluation/index.md
      - evaluation/foundations.md
      - evaluation/eval-flywheel.md
  - LLMOps and Production:
      - llmops-production/index.md
      - llmops-production/enterprise-llm-apps.md
      - llmops-production/ai-infra.md
      - llmops-production/llm-gateway.md
      - llmops-production/enterprise-assistant-design-prompt.md
  - Security, Safety, and Governance:
      - security-safety-governance/index.md
      - security-safety-governance/foundations.md
      - security-safety-governance/safety-controls.md
  - Case Studies:
      - case-studies/index.md
      - case-studies/microsoft-ask-learn.md
  - Contributing:
      - Style Guide: contributing/style-guide.md
      - Chapter Template: contributing/chapter-template.md
      - Review Process: contributing/review-process.md

# Material gives a solid docs/book baseline without custom frontend code.
theme:
  name: material
  language: en
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.indexes
    - navigation.expand
    - navigation.sections
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

# Search is built in. Mermaid is the only extra plugin to keep diagrams easy to author.
# The runtime is vendored locally so strict builds do not depend on live CDN checks.
plugins:
  - search
  - mermaid2:
      javascript: assets/javascripts/mermaid.min.js

# Extensions are chosen for technical writing, clean callouts, diagrams, and copy-paste friendly code.
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# Keep visual overrides small and local to avoid frontend maintenance overhead.
extra_css:
  - assets/stylesheets/extra.css

copyright: Copyright © 2026 Contributors to Grokking LLM System Design
