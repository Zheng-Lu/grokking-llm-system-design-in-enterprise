# Canonical project metadata used by the generated site.
site_name: Grokking LLM System Design
site_description: Reader-first technical book on LLM system archetypes, from platform infra to retrieval, agents, model lifecycle, and vertical applications.
site_url: https://zheng-lu.github.io/grokking-llm-system-design-in-enterprise/
repo_url: https://github.com/Zheng-Lu/grokking-llm-system-design-in-enterprise
repo_name: GitHub
edit_uri: edit/main/docs/

# Keep the build strict so broken internal links and malformed pages fail fast in CI.
docs_dir: docs
site_dir: site
strict: true

# The sidebar catalogue follows stable system archetypes so the book grows by section,
# not as a flat list of disconnected prompts.
nav:
  - Home: index.md
  - Introduction:
      - introduction/index.md
      - introduction/about.md
      - introduction/roadmap.md
  - Foundations of LLM System Design:
      - foundations/index.md
      - foundations/system-boundaries.md
      - foundations/control-surfaces.md
      - foundations/retrieval-foundations.md
      - foundations/agent-foundations.md
  - LLM Infrastructure:
      - llm-infrastructure/index.md
      - llm-infrastructure/inference/index.md
      - llm-infrastructure/inference/offline-batch-inference-service.md
      - llm-infrastructure/inference/online-inference-service.md
      - llm-infrastructure/platform/index.md
      - llm-infrastructure/platform/platform-foundations.md
      - llm-infrastructure/platform/llm-gateway-proxy.md
      - llm-infrastructure/platform/evaluation-observability-system.md
  - Knowledge Retrieval Systems:
      - knowledge-retrieval-systems/index.md
      - knowledge-retrieval-systems/internal-chatgpt.md
      - knowledge-retrieval-systems/domain-specific-q-and-a-bot.md
      - knowledge-retrieval-systems/notebooklm.md
      - knowledge-retrieval-systems/microsoft-ask-learn.md
  - Agent Systems:
      - agent-systems/index.md
      - agent-systems/internal-coding-agent.md
      - agent-systems/multi-agent-orchestration.md
  - Model Lifecycle:
      - model-lifecycle/index.md
      - model-lifecycle/llm-fine-tuning-system.md
  - Vertical Applications:
      - vertical-applications/index.md
      - vertical-applications/application-patterns.md
      - vertical-applications/ai-shopping-chatbot.md
  - Contributing:
      - Style Guide: contributing/style-guide.md
      - Chapter Template: contributing/chapter-template.md
      - Review Process: contributing/review-process.md

# Material gives a solid docs/book baseline without custom frontend code.
theme:
  name: material
  language: en
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.indexes
    - navigation.expand
    - navigation.sections
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

# Search is built in. Mermaid is the only extra plugin to keep diagrams easy to author.
# The runtime is vendored locally so strict builds do not depend on live CDN checks.
plugins:
  - search
  - mermaid2:
      javascript: assets/javascripts/mermaid.min.js

# Extensions are chosen for technical writing, clean callouts, diagrams, and copy-paste friendly code.
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# Keep visual overrides small and local to avoid frontend maintenance overhead.
extra_css:
  - assets/stylesheets/extra.css

copyright: Copyright © 2026 Contributors to Grokking LLM System Design
